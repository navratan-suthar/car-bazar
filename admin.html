<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Car Bazar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">Car Bazar Admin Panel</h1>
    
    <!-- Login Section -->
    <div id="loginSection" class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
      <h2 class="text-2xl font-semibold mb-4">Login</h2>
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" id="username" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">Login</button>
      </form>
      <div id="loginError" class="mt-4 text-red-600 hidden"></div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="hidden">
      <!-- Navigation Tabs -->
      <div class="mb-6 border-b border-gray-200">
        <nav class="flex space-x-4">
          <button class="tab-btn active px-4 py-2 border-b-2 border-blue-600 text-blue-600" data-tab="market">Market Info</button>
          <button class="tab-btn px-4 py-2 text-gray-600 hover:text-blue-600" data-tab="owners">Owners</button>
          <button class="tab-btn px-4 py-2 text-gray-600 hover:text-blue-600" data-tab="cars">Cars</button>
        </nav>
      </div>

      <!-- Market Info Tab -->
      <div id="tabMarket" class="tab-content">
        <div class="bg-white p-6 rounded-lg shadow-md">
          <h2 class="text-2xl font-semibold mb-4">Market Information</h2>
          <form id="marketForm" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
              <input type="text" id="marketTitle" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
              <textarea id="marketAddress" required rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-md"></textarea>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Hours</label>
              <input type="text" id="marketHours" class="w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            <button type="submit" class="bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">Update Market Info</button>
          </form>
          <div id="marketMessage" class="mt-4"></div>
        </div>
      </div>

      <!-- Owners Tab -->
      <div id="tabOwners" class="tab-content hidden">
        <div class="space-y-6">
          <div id="ownersList" class="space-y-4"></div>
        </div>
      </div>

      <!-- Cars Tab -->
      <div id="tabCars" class="tab-content hidden">
        <div class="mb-4">
          <button id="addCarBtn" class="bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700">Add New Car</button>
        </div>
        <div id="carsList" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <script>
    let authToken = localStorage.getItem('authToken');
    const API_BASE = window.location.origin;

    // Check if already logged in
    if (authToken) {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('adminDashboard').classList.remove('hidden');
      loadAdminData();
    }

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        if (response.ok) {
          authToken = data.token;
          localStorage.setItem('authToken', authToken);
          document.getElementById('loginSection').classList.add('hidden');
          document.getElementById('adminDashboard').classList.remove('hidden');
          loadAdminData();
        } else {
          document.getElementById('loginError').textContent = data.error || 'Login failed';
          document.getElementById('loginError').classList.remove('hidden');
        }
      } catch (error) {
        document.getElementById('loginError').textContent = 'Connection error';
        document.getElementById('loginError').classList.remove('hidden');
      }
    });

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => {
          b.classList.remove('active', 'border-b-2', 'border-blue-600', 'text-blue-600');
          b.classList.add('text-gray-600');
        });
        btn.classList.add('active', 'border-b-2', 'border-blue-600', 'text-blue-600');
        btn.classList.remove('text-gray-600');

        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.remove('hidden');
      });
    });

    // Load admin data
    async function loadAdminData() {
      loadMarketInfo();
      loadOwners();
      loadCars();
    }

    // Market Info
    async function loadMarketInfo() {
      try {
        const response = await fetch(`${API_BASE}/api/market-info`);
        const data = await response.json();
        if (data) {
          document.getElementById('marketTitle').value = data.title || '';
          document.getElementById('marketAddress').value = data.address || '';
          document.getElementById('marketHours').value = data.hours || '';
        }
      } catch (error) {
        console.error('Error loading market info:', error);
      }
    }

    document.getElementById('marketForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        title: document.getElementById('marketTitle').value,
        address: document.getElementById('marketAddress').value,
        hours: document.getElementById('marketHours').value
      };

      try {
        const response = await fetch(`${API_BASE}/api/admin/market-info`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();
        const msgDiv = document.getElementById('marketMessage');
        if (response.ok) {
          msgDiv.textContent = 'Market info updated successfully!';
          msgDiv.className = 'mt-4 text-green-600';
        } else {
          msgDiv.textContent = result.error || 'Update failed';
          msgDiv.className = 'mt-4 text-red-600';
        }
      } catch (error) {
        document.getElementById('marketMessage').textContent = 'Connection error';
        document.getElementById('marketMessage').className = 'mt-4 text-red-600';
      }
    });

    // Owners
    async function loadOwners() {
      try {
        const response = await fetch(`${API_BASE}/api/admin/owners`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        const owners = await response.json();
        const container = document.getElementById('ownersList');
        container.innerHTML = owners.map(owner => `
          <div class="bg-white p-6 rounded-lg shadow-md">
            <h3 class="text-xl font-semibold mb-4">${owner.name} (${owner.position})</h3>
            <form class="owner-form space-y-4" data-id="${owner.id}">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                <input type="text" name="name" value="${owner.name}" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Contact</label>
                <input type="text" name="contact" value="${owner.contact}" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
                <input type="text" name="address" value="${owner.address || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-md">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Current Image</label>
                <img src="${owner.image_path}" alt="${owner.name}" class="w-24 h-24 object-cover rounded">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Upload New Image</label>
                <input type="file" name="image" accept="image/*" class="w-full px-3 py-2 border border-gray-300 rounded-md">
              </div>
              <button type="submit" class="bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">Update Owner</button>
            </form>
            <div class="owner-message mt-2"></div>
          </div>
        `).join('');

        // Attach form handlers
        container.querySelectorAll('.owner-form').forEach(form => {
          form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const ownerId = form.dataset.id;
            const msgDiv = form.nextElementSibling;

            try {
              const response = await fetch(`${API_BASE}/api/admin/owners/${ownerId}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${authToken}` },
                body: formData
              });

              const result = await response.json();
              if (response.ok) {
                msgDiv.textContent = 'Owner updated successfully!';
                msgDiv.className = 'owner-message mt-2 text-green-600';
                loadOwners();
              } else {
                msgDiv.textContent = result.error || 'Update failed';
                msgDiv.className = 'owner-message mt-2 text-red-600';
              }
            } catch (error) {
              msgDiv.textContent = 'Connection error';
              msgDiv.className = 'owner-message mt-2 text-red-600';
            }
          });
        });
      } catch (error) {
        console.error('Error loading owners:', error);
      }
    }

    // Cars
    async function loadCars() {
      try {
        const response = await fetch(`${API_BASE}/api/admin/cars`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        const cars = await response.json();
        const container = document.getElementById('carsList');
        container.innerHTML = cars.map(car => `
          <div class="bg-white p-6 rounded-lg shadow-md">
            <div class="flex justify-between items-start mb-4">
              <h3 class="text-xl font-semibold">${car.title}</h3>
              <button class="delete-car bg-red-600 text-white py-1 px-3 rounded text-sm hover:bg-red-700" data-id="${car.id}">Delete</button>
            </div>
            <form class="car-form space-y-4" data-id="${car.id}">
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                  <input type="text" name="title" value="${car.title}" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Price</label>
                  <input type="text" name="price" value="${car.price}" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
                </div>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <input type="text" name="description" value="${car.description || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-md">
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Posted Date</label>
                  <input type="text" name="posted_date" value="${car.posted_date || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Section</label>
                  <select name="section" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                    <option value="home" ${car.section === 'home' ? 'selected' : ''}>Home</option>
                    <option value="all" ${car.section === 'all' ? 'selected' : ''}>All Cars</option>
                  </select>
                </div>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Current Image</label>
                <img src="${car.image_path}" alt="${car.title}" class="w-48 h-32 object-cover rounded">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Upload New Image</label>
                <input type="file" name="image" accept="image/*" class="w-full px-3 py-2 border border-gray-300 rounded-md">
              </div>
              <button type="submit" class="bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">Update Car</button>
            </form>
            <div class="car-message mt-2"></div>
          </div>
        `).join('');

        // Attach form handlers
        container.querySelectorAll('.car-form').forEach(form => {
          form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const carId = form.dataset.id;
            const msgDiv = form.nextElementSibling;

            try {
              const response = await fetch(`${API_BASE}/api/admin/cars/${carId}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${authToken}` },
                body: formData
              });

              const result = await response.json();
              if (response.ok) {
                msgDiv.textContent = 'Car updated successfully!';
                msgDiv.className = 'car-message mt-2 text-green-600';
                loadCars();
              } else {
                msgDiv.textContent = result.error || 'Update failed';
                msgDiv.className = 'car-message mt-2 text-red-600';
              }
            } catch (error) {
              msgDiv.textContent = 'Connection error';
              msgDiv.className = 'car-message mt-2 text-red-600';
            }
          });
        });

        // Delete handlers
        container.querySelectorAll('.delete-car').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (!confirm('Are you sure you want to delete this car?')) return;
            const carId = btn.dataset.id;
            try {
              const response = await fetch(`${API_BASE}/api/admin/cars/${carId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${authToken}` }
              });
              if (response.ok) {
                loadCars();
              }
            } catch (error) {
              alert('Error deleting car');
            }
          });
        });
      } catch (error) {
        console.error('Error loading cars:', error);
      }
    }

    // Add new car
    document.getElementById('addCarBtn').addEventListener('click', () => {
      const form = `
        <div class="bg-white p-6 rounded-lg shadow-md mb-4">
          <h3 class="text-xl font-semibold mb-4">Add New Car</h3>
          <form id="newCarForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
                <input type="text" name="title" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Price *</label>
                <input type="text" name="price" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
              <input type="text" name="description" class="w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Posted Date</label>
                <input type="text" name="posted_date" value="Just now" class="w-full px-3 py-2 border border-gray-300 rounded-md">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Section</label>
                <select name="section" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                  <option value="home">Home</option>
                  <option value="all">All Cars</option>
                </select>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Image *</label>
              <input type="file" name="image" accept="image/*" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            <div class="flex gap-2">
              <button type="submit" class="bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700">Add Car</button>
              <button type="button" id="cancelAddCar" class="bg-gray-600 text-white py-2 px-4 rounded-md hover:bg-gray-700">Cancel</button>
            </div>
          </form>
          <div id="newCarMessage" class="mt-2"></div>
        </div>
      `;
      document.getElementById('carsList').insertAdjacentHTML('afterbegin', form);

      document.getElementById('newCarForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const msgDiv = document.getElementById('newCarMessage');

        try {
          const response = await fetch(`${API_BASE}/api/admin/cars`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${authToken}` },
            body: formData
          });

          const result = await response.json();
          if (response.ok) {
            msgDiv.textContent = 'Car added successfully!';
            msgDiv.className = 'mt-2 text-green-600';
            setTimeout(() => {
              loadCars();
            }, 1000);
          } else {
            msgDiv.textContent = result.error || 'Failed to add car';
            msgDiv.className = 'mt-2 text-red-600';
          }
        } catch (error) {
          msgDiv.textContent = 'Connection error';
          msgDiv.className = 'mt-2 text-red-600';
        }
      });

      document.getElementById('cancelAddCar').addEventListener('click', () => {
        document.getElementById('carsList').firstElementChild.remove();
      });
    });
  </script>
</body>
</html>
